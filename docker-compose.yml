services:
  postgres:
    image: postgres:16-alpine
    container_name: psich-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: psich
      POSTGRES_PASSWORD: psich
      POSTGRES_DB: psich
    ports:
      - '5432:5432'
    volumes:
      - psich-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U psich -d psich']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  psich-postgres-data:
